<!DOCTYPE html>
<html>
<head>

    <title>Activity Logs</title>

    <style>

        body{
            font-family: Arial;
            background: #f4f4f4;
            padding: 40px;
        }

        .container{
            width: 800px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
        }

        h1{
            text-align: center;
            margin-bottom: 30px;
        }

        .log{
            padding: 12px;
            border-bottom: 1px solid #ddd;
            font-family: monospace;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>Activity Logs</h1>

    {% for log in logs %}

        <div class="log">
            {{ log }}
        </div>

    {% endfor %}

</div>

</body>
</html>
