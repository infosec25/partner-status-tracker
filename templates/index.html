<!DOCTYPE html>
<html>
<head>
    <title>Partner Status Tracker</title>

    <style>

        body{
            font-family: Arial;
            background: #f4f6f9;
            margin: 0;
            padding: 30px;
        }

        .container{
            max-width: 900px;
            margin: auto;
        }

        h1{
            text-align: center;
            color: #1f2937;
            margin-bottom: 30px;
        }

        .button-group{
            text-align: center;
            margin-bottom: 25px;
        }

        .btn{
            padding: 12px 22px;
            border: none;
            border-radius: 8px;
            text-decoration: none;
            color: white;
            margin: 5px;
            font-weight: bold;
        }

        .reset-btn{
            background: #2563eb;
        }

        .logs-btn{
            background: #059669;
        }

        .clear-btn{
            background: #dc2626;
        }

        table{
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        th{
            background: #111827;
            color: white;
            padding: 15px;
        }

        td{
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        .true{
            color: green;
            font-weight: bold;
        }

        .false{
            color: red;
            font-weight: bold;
        }

        tr:hover{
            background: #f9fafb;
        }

    </style>

</head>
<body>

<div class="container">

    <h1>PARTNER STATUS TRACKER</h1>

    <div class="button-group">

        <a href="/reset-all" class="btn reset-btn">
            RESET ALL STATUS
        </a>

        <a href="/logs" class="btn logs-btn">
            VIEW LOGS
        </a>

        <a href="/clear-logs" class="btn clear-btn">
            CLEAR LOGS
        </a>

    </div>

    <table>

        <tr>
            <th>USER</th>
            <th>STATUS</th>
            <th>LAST UPDATED</th>
            
        </tr>

        {% for user, data in users.items() %}

        <tr>

            <td>{{ user.upper() }}</td>

            <td>
                {% if data.status %}
                    <span class="true">TRUE</span>
                {% else %}
                    <span class="false">FALSE</span>
                {% endif %}
            </td>

            <td>
                {{ data.timestamp }}
            </td>

        </tr>

        {% endfor %}

    </table>

</div>

</body>
</html>
